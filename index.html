<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect With Me</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Core Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0f172a; /* Solid deep base color */
            min-height: 100vh;
            overflow: hidden; /* Prevents background body scrolling */
            position: relative;
        }

        /* Ambient Dark Blurred Background Matrix */
        .bg-glow {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
        }

        /* The 75% Native Bottom Sheet */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 75vh; /* Covers exactly 75% of the screen */
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px 32px 0 0;
            padding: 16px 24px 40px 24px;
            text-align: center;
            box-shadow: 0 -15px 35px rgba(0, 0, 0, 0.4);
            z-index: 10;
            
            /* The Slide-Up Animation mechanics */
            transform: translateY(100%);
            animation: slideUp 0.65s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
            animation-delay: 0.2s; /* Tiny delay so the screen registers the app entry first */
            
            /* Allow scrolling inside the card stack if text overflows small screens */
            display: flex;
            flex-direction: column;
        }

        /* Native App Drag Indicator Handle Bar */
        .drag-handle {
            width: 40px;
            height: 5px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            margin: 0 auto 24px auto;
            flex-shrink: 0;
        }

        .scrollable-content {
            overflow-y: auto;
            flex-grow: 1;
            padding-bottom: 20px;
        }

        /* Profile Elements */
        .profile-img {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 14px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.88rem;
            color: #94a3b8;
            margin-bottom: 24px;
        }

        /* Links Stack */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 15px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            text-decoration: none;
            color: #f8fafc;
            transition: all 0.2s ease;
        }

        .link-card i {
            font-size: 1.25rem;
            width: 28px;
            text-align: left;
        }
        
        .fa-user-plus { color: #38bdf8; }
        .fa-linkedin { color: #0077b5; }
        .fa-instagram { color: #e1306c; }
        .fa-youtube { color: #ff0000; }
        .fa-file-invoice-dollar { color: #4ade80; }

        .link-text {
            flex-grow: 1;
            text-align: left;
            font-size: 0.92rem;
            font-weight: 500;
            padding-left: 8px;
        }

        .arrow-icon {
            font-size: 0.75rem !important;
            color: #64748b;
        }

        .link-card:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Slide-Up Animation Definition */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="bottom-sheet">
        <div class="drag-handle"></div>
        
        <div class="scrollable-content">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200&auto=format&fit=crop&q=80" alt="Profile" class="profile-img">
            
            <h1>Your Name</h1>
            <p class="subtitle">Founder & Entrepreneur</p>

            <div class="links-stack">
                <a href="https://yourwebsite.com/contact.vcf" class="link-card">
                    <i class="fa-solid fa-user-plus"></i>
                    <span class="link-text">Save Contact Details</span>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>

                <a href="https://linkedin.com/in/yourusername" target="_blank" class="link-card">
                    <i class="fa-brands fa-linkedin"></i>
                    <span class="link-text">Connect on LinkedIn</span>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>

                <a href="https://instagram.com/yourusername" target="_blank" class="link-card">
                    <i class="fa-brands fa-instagram"></i>
                    <span class="link-text">Follow on Instagram</span>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>

                <a href="https://youtube.com/@yourusername" target="_blank" class="link-card">
                    <i class="fa-brands fa-youtube"></i>
                    <span class="link-text">Watch on YouTube</span>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>

                <a href="https://drive.google.com/file/d/your-shared-pdf-link/view" target="_blank" class="link-card">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                    <span class="link-text">View Catalog & Pricing</span>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        const CACHE_NAME = 'bio-links-v1';
        const ASSETS = [
            window.location.pathname,
            window.location.href,
            'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'
        ];

        // Self-contained service worker registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const blob = new Blob([`
                    self.addEventListener('install', (e) => {
                        e.waitUntil(caches.open('${CACHE_NAME}').then((cache) => cache.addAll(${JSON.stringify(ASSETS)})));
                    });
                    self.addEventListener('fetch', (e) => {
                        e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request)));
                    });
                `], { type: 'application/javascript' });
                
                const workerUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(workerUrl).catch(err => console.log('SW registration skipped'));
            });
        }
    </script>
</body>
</html>
