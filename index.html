<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>St. Ann's High School Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <meta name="theme-color" content="#721c24">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Core School Identity Color Palette Extracted from Logo */
        :root {
            --school-maroon: #58181A;  /* Deep Crimson Burgundy Crimson Base */
            --school-gold: #8C763F;    /* Prestigious Old Gold Accent Accent */
            --school-red: #D92B32;     /* Bright Crimson Callout Text Highlight */
            --bg-light: #FBF9F6;       /* Clean Premium Linen Ivory canvas background */
            --card-glass: rgba(255, 255, 255, 0.85);
            --border-glass: rgba(140, 118, 63, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-light);
            min-height: 100vh;
            overflow: hidden; 
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Elegantly Rendered Background Structural Assets mimicking the logo lines */
        .academic-wave-top {
            position: absolute;
            top: -15%;
            right: -20%;
            width: 75%;
            height: 45%;
            background: radial-gradient(circle, rgba(88, 24, 26, 0.08) 0%, rgba(0,0,0,0) 70%);
            border-bottom: 2px solid rgba(140, 118, 63, 0.2);
            border-radius: 50%;
            z-index: 1;
            transform: rotate(-10deg);
        }

        .academic-wave-bottom {
            position: absolute;
            bottom: -10%;
            left: -20%;
            width: 80%;
            height: 45%;
            background: radial-gradient(circle, rgba(140, 118, 63, 0.06) 0%, rgba(0,0,0,0) 70%);
            border-top: 2px solid rgba(88, 24, 26, 0.15);
            border-radius: 50%;
            z-index: 1;
            transform: rotate(15deg);
        }

        /* Full Screen Production Grid Frame */
        .connect-portal {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: linear-gradient(180deg, rgba(251, 249, 246, 0.9) 0%, rgba(244, 239, 230, 0.98) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-glass);
            border-right: 1px solid var(--border-glass);
            padding: 32px 24px 45px 24px;
            text-align: center;
            box-shadow: 0 0 40px rgba(88, 24, 26, 0.06);
            z-index: 10;
            
            /* Physical Card Insertion Animation Mechanics anchored to absolute bottom center */
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateY(100%) translateX(-50%);
            animation: cardInsertionLaunch 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
            animation-delay: 0.1s;
            
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .drag-handle-bar {
            width: 42px;
            height: 4px;
            background: rgba(88, 24, 26, 0.15);
            border-radius: 10px;
            margin: 0 auto 28px auto;
            flex-shrink: 0;
        }

        .scrollable-inner {
            overflow-y: auto;
            flex-grow: 1;
            padding-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        /* Branding Core Typography */
        .brand-block {
            margin-bottom: 32px;
        }

        /* Fixed Image Frame Container Setup */
        .logo-placeholder-svg {
            width: 110px;
            height: 110px;
            margin: 0 auto 16px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .logo-placeholder-svg img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--school-maroon);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .affiliation-tag {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--school-gold);
            letter-spacing: 1px;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .curriculum-tag {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--school-red);
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Fine Institutional Lists Architecture */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .interactive-row {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            background: #ffffff;
            border: 1px solid rgba(140, 118, 63, 0.12);
            border-radius: 16px;
            text-decoration: none;
            color: var(--school-maroon);
            box-shadow: 0 4px 12px rgba(88, 24, 26, 0.02);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .interactive-row i {
            font-size: 1.2rem;
            width: 30px;
            text-align: left;
        }

        /* Mapping palette profiles into the core utility markers */
        .fa-phone-flip { color: var(--school-maroon); }
        .fa-phone-volume { color: var(--school-gold); }
        .fa-file-invoice { color: var(--school-red); }
        .fa-map-location-dot { color: #6b7280; }

        .label-text {
            flex-grow: 1;
            text-align: left;
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: -0.1px;
            padding-left: 6px;
        }

        .chevron-indicator {
            font-size: 0.75rem !important;
            color: #94a3b8;
            text-align: right !important;
        }

        .interactive-row:hover {
            border-color: var(--school-maroon);
            transform: translateX(4px);
            box-shadow: 0 6px 16px rgba(88, 24, 26, 0.05);
        }

        .interactive-row:active {
            transform: scale(0.98);
            background: #fbfbfb;
        }

        /* Repositioned & Anchored Social Media Section - Moved Upwards */
        .social-strip-wrapper {
            padding-top: 10px;
            margin-bottom: 55px; /* Shifted upwards to maximize safe spacing from native browser bars */
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        .social-strip-inner {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
        }

        .social-icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: #ffffff;
            border: 1px solid rgba(140, 118, 63, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }

        .social-icon-btn i {
            font-size: 1.3rem;
        }

        /* Standard Native Social Brand Profiles */
        .fa-instagram { color: #e1306c; }
        .fa-facebook { color: #1877f2; }
        .fa-youtube { color: #ff0000; }

        .social-icon-btn:hover {
            transform: translateY(-3px);
            border-color: var(--school-maroon);
            box-shadow: 0 6px 14px rgba(88, 24, 26, 0.08);
        }

        .social-icon-btn:active {
            transform: scale(0.92);
        }

        /* Premium Insertion Mechanism Animation */
        @keyframes cardInsertionLaunch {
            from {
                transform: translateY(100%) translateX(-50%);
                opacity: 0;
            }
            75% {
                transform: translateY(-3%) translateX(-50%); /* Distinct overshoot click */
                opacity: 1;
            }
            to {
                transform: translateY(0%) translateX(-50%);  /* Drop down and lock precisely */
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="academic-wave-top"></div>
    <div class="academic-wave-bottom"></div>

    <div class="connect-portal">
        <div class="drag-handle-bar"></div>
        
        <div class="scrollable-inner">
            <div class="brand-block">
                <div class="logo-placeholder-svg">
                    <img src="./SAHS-logo.png" alt="St. Ann's High School Crest">
                </div>
                <h1>ST. ANN'S HIGH SCHOOL</h1>
                <p class="affiliation-tag">A Unit of Advent Group</p>
                <p class="curriculum-tag">Under CBSE Curriculum New Delhi • <span style="color: var(--school-red); font-weight: 700;">English Medium</span></p>
            </div>

            <div class="links-stack">
                <a href="tel:+918092285112" class="interactive-row">
                    <i class="fa-solid fa-phone-flip"></i>
                    <span class="label-text">Main Office Line</span>
                    <i class="fa-solid fa-chevron-right chevron-indicator"></i>
                </a>

                <a href="tel:+91XXXXXXXXXX" class="interactive-row">
                    <i class="fa-solid fa-phone-volume"></i>
                    <span class="label-text">Alternate Contact Line</span>
                    <i class="fa-solid fa-chevron-right chevron-indicator"></i>
                </a>

                <a href="https://drive.google.com/file/d/your-shared-fee-pdf-link/view" target="_blank" class="interactive-row">
                    <i class="fa-solid fa-file-invoice"></i>
                    <span class="label-text">Admission Brochure & Fee Structure</span>
                    <i class="fa-solid fa-chevron-right chevron-indicator"></i>
                </a>

                <a href="https://maps.google.com/?q=25.591278,85.145679" target="_blank" class="interactive-row">
                    <i class="fa-solid fa-map-location-dot"></i>
                    <span class="label-text">Campus Location (Open Maps)</span>
                    <i class="fa-solid fa-chevron-right chevron-indicator"></i>
                </a>
            </div>
        </div>

        <div class="social-strip-wrapper">
            <div class="social-strip-inner">
                <a href="https://instagram.com/yourusername" target="_blank" class="social-icon-btn" aria-label="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://facebook.com/yourusername" target="_blank" class="social-icon-btn" aria-label="Facebook">
                    <i class="fa-brands fa-facebook"></i>
                </a>
                <a href="https://youtube.com/@yourusername" target="_blank" class="social-icon-btn" aria-label="YouTube">
                    <i class="fa-brands fa-youtube"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        const CACHE_NAME = 'stanns-portal-v6';
        const ASSETS = [
            window.location.pathname,
            window.location.href,
            'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'
        ];

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const blob = new Blob([`
                    self.addEventListener('install', (e) => {
                        e.waitUntil(caches.open('${CACHE_NAME}').then((cache) => cache.addAll(${JSON.stringify(ASSETS)})));
                    });
                    self.addEventListener('fetch', (e) => {
                        e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request)));
                    });
                `], { type: 'application/javascript' });
                const workerUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(workerUrl).catch(err => {});
            });
        }
    </script>
</body>
</html>
