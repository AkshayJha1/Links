<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect With Me</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Reset and Core Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* Smooth modern gradient background */
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* App-like Container */
        .app-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: appPopup 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Profile Section */
        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 16px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 28px;
        }

        /* Links/Buttons Stack */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            text-decoration: none;
            color: #f8fafc;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        /* Accent theme colors for individual icons */
        .link-card i {
            font-size: 1.3rem;
            width: 30px;
            text-align: left;
        }
        
        .fa-user-plus { color: #38bdf8; }   /* Save Contact */
        .fa-linkedin { color: #0077b5; }    /* LinkedIn */
        .fa-instagram { color: #e1306c; }   /* Instagram */
        .fa-youtube { color: #ff0000; }     /* YouTube */
        .fa-file-invoice-dollar { color: #4ade80; } /* Pricing */

        .link-text {
            flex-grow: 1;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 500;
            padding-left: 10px;
        }

        .arrow-icon {
            font-size: 0.8rem !important;
            color: #64748b;
            text-align: right !important;
            width: auto !important;
        }

        /* Hover & Tap Animations */
        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .link-card:active {
            transform: translateY(1px);
            background: rgba(255, 255, 255, 0.07);
        }

        /* Clean entry popup animation */
        @keyframes appPopup {
            0% {
                opacity: 0;
                transform: scale(0.93) translateY(15px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200&auto=format&fit=crop&q=80" alt="Profile" class="profile-img">
        
        <h1>Your Name</h1>
        <p class="subtitle">Founder & Entrepreneur</p>

        <div class="links-stack">

            <a href="https://yourwebsite.com/contact.vcf" class="link-card">
                <i class="fa-solid fa-user-plus"></i>
                <span class="link-text">Save Contact Details</span>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>

            <a href="https://linkedin.com/in/yourusername" target="_blank" class="link-card">
                <i class="fa-brands fa-linkedin"></i>
                <span class="link-text">Connect on LinkedIn</span>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>

            <a href="https://instagram.com/yourusername" target="_blank" class="link-card">
                <i class="fa-brands fa-instagram"></i>
                <span class="link-text">Follow on Instagram</span>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>

            <a href="https://youtube.com/@yourusername" target="_blank" class="link-card">
                <i class="fa-brands fa-youtube"></i>
                <span class="link-text">Watch on YouTube</span>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>

            <a href="https://drive.google.com/file/d/your-shared-pdf-link/view" target="_blank" class="link-card">
                <i class="fa-solid fa-file-invoice-dollar"></i>
                <span class="link-text">View Catalog & Pricing</span>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>

        </div>
    </div>

</body>
</html>
