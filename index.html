<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>St. Ann's Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Core Reset & School Color System extracted from logo and card */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-navy: #0f172a; /* Deep Navy from image_7.png */
            --accent-cyan: #00f5ff;  /* Bright Cyan from image_7.png line accents */
            --off-white: #f1f5f9;
            --text-dark: #cbd5e1;
            --glass-bg: rgba(15, 23, 42, 0.7);
        }

        body {
            background-color: var(--primary-navy);
            min-height: 100vh;
            overflow: hidden; /* Prevents initial background body scrolling */
            position: relative;
            color: var(--off-white);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient Dark Matrix with specific color glow */
        .bg-glow {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.12) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
        }

        /* Full Screen Native-like Card Matrix */
        .connect-portal {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.8) 0%, rgba(10, 17, 40, 1) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px 32px 0 0;
            padding: 24px 24px 40px 24px;
            text-align: center;
            box-shadow: 0 -15px 35px rgba(0, 0, 0, 0.5);
            z-index: 10;
            
            /* Enhanced Card Insertion Animation */
            transform: translateY(100%) translateX(-50%); /* Anchor to bottom center */
            left: 50%;
            position: absolute;
            bottom: 0;

            /* Strong 'locking-in' effect with bounce at the peak */
            animation: cardInsertion 0.75s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.15s; /* Small delay to register app entry */
            
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* App-like Drag Indicator Handle */
        .drag-handle {
            width: 40px;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 0 auto 24px auto;
            flex-shrink: 0;
        }

        .scrollable-content {
            overflow-y: auto;
            flex-grow: 1;
            padding-bottom: 20px;
        }

        /* Profile Elements tailored for institution branding */
        .profile-img {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 14px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3), 0 0 0 3px var(--accent-cyan);
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--off-white);
            margin-bottom: 4px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-dark);
            margin-bottom: 28px;
            font-weight: 500;
        }

        /* Functional Links Stack */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            text-decoration: none;
            color: var(--off-white);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-card i {
            font-size: 1.25rem;
            width: 28px;
            text-align: left;
        }
        
        /* Functional Component Icons Mapping */
        .fa-phone-flip { color: var(--accent-cyan); }         /* Main Call */
        .fa-phone-volume { color: #60a5fa; }         /* Alternate Call */
        .fa-file-pdf { color: #4ade80; }             /* Brochure */
        .fa-map-location-dot { color: #f87171; }     /* Maps */

        .link-text {
            flex-grow: 1;
            text-align: left;
            font-size: 0.92rem;
            font-weight: 600;
            padding-left: 8px;
        }

        .arrow-icon {
            font-size: 0.75rem !important;
            color: #64748b;
        }

        .link-card:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.07);
        }

        /* Visually Floating Social Media Strip */
        .social-strip {
            position: absolute;
            bottom: 70px; /* REALIGNED HIGHER: Shifts icons upward to avoid overlap with phone navigation bar */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            width: 100%;
            z-index: 15;
            flex-shrink: 0;
            animation: appPopup 0.5s ease forwards;
            animation-delay: 0.6s; /* Appear after the main card insertion */
            opacity: 0;
        }

        .social-icon-btn {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .social-icon-btn i {
            font-size: 1.4rem;
        }

        /* Branding Colors tailored for specific logos */
        .fa-instagram { color: #e1306c; }
        .fa-facebook { color: #1877f2; }
        .fa-youtube { color: #ff0000; }

        .social-icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        .social-icon-btn:active {
            transform: scale(0.92);
        }

        /* Advanced Card Insertion Animation Definition */
        @keyframes cardInsertion {
            from {
                transform: translateY(100%) translateX(-50%) scale(1);
                opacity: 0;
            }
            70% {
                transform: translateY(-5%) translateX(-50%) scale(1.02); /* Slight overshoot for bounce */
                opacity: 1;
            }
            to {
                transform: translateY(0%) translateX(-50%) scale(1); /* Lock into position */
                opacity: 1;
            }
        }

        /* Gentle popup for social strip */
        @keyframes appPopup {
            to {
                opacity: 1;
                transform: translateY(0) translateX(-50%);
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="connect-portal">
        <div class="drag-handle"></div>
        
        <div class="scrollable-content">
            <img src="https://yourwebsite.com/school-crest-emblem.png" alt="St. Ann's Crest" class="profile-img">
            
            <h1>ST. ANN'S HIGH SCHOOL</h1>
            <p class="subtitle">Admissions, Communication & Support Hub</p>

            <div class="links-stack">
                <a href="tel:+918092285112" class="link-card">
                    <i class="fa-solid fa-phone-flip"></i>
                    <span class="link-text">Contact Main Office</span>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>

                <a href="tel:+91XXXXXXXXXX" class="link-card">
                    <i class="fa-solid fa-phone-volume"></i>
                    <span class="link-text">Admissions & Support Line</span>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>

                <a href="https://drive.google.com/file/d/your-shared-fee-pdf-link/view" target="_blank" class="link-card">
                    <i class="fa-solid fa-file-pdf"></i>
                    <span class="link-text">Admissions Brochure & Fee Structure</span>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>

                <a href="https://www.google.com/maps/search/?api=1&query=25.591278,85.145679" target="_blank" class="link-card">
                    <i class="fa-solid fa-map-location-dot"></i>
                    <span class="link-text">Campus Location (Open Maps)</span>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>
            </div>
        </div>

        <div class="social-strip">
            <a href="https://instagram.com/yourusername" target="_blank" class="social-icon-btn" aria-label="Instagram Feed">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://facebook.com/yourusername" target="_blank" class="social-icon-btn" aria-label="Facebook Page">
                <i class="fa-brands fa-facebook"></i>
            </a>
            <a href="https://youtube.com/@yourusername" target="_blank" class="social-icon-btn" aria-label="YouTube Channel">
                <i class="fa-brands fa-youtube"></i>
            </a>
        </div>
    </div>

    <script>
        const CACHE_NAME = 'school-portal-v3';
        const ASSETS = [
            window.location.pathname,
            window.location.href,
            'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'
        ];

        // Register Service Worker inline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const blob = new Blob([`
                    self.addEventListener('install', (e) => {
                        e.waitUntil(caches.open('${CACHE_NAME}').then((cache) => cache.addAll(${JSON.stringify(ASSETS)})));
                    });
                    self.addEventListener('fetch', (e) => {
                        e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request)));
                    });
                `], { type: 'application/javascript' });
                const workerUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(workerUrl).catch(err => console.log('SW registration skipped'));
            });
        }
    </script>
</body>
</html>
