<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Institutional Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <meta name="theme-color" content="#0a1128">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* Core System Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0a1128; /* Premium Deep Navy Matching the Card */
            min-height: 100vh;
            color: #f8fafc;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient Fluid Background Elements inspired by the physical card artwork */
        .brand-curve-left {
            position: absolute;
            top: -10%;
            left: -40%;
            width: 80%;
            height: 60%;
            background: radial-gradient(circle, rgba(0, 180, 216, 0.08) 0%, rgba(0,0,0,0) 70%);
            border-right: 2px solid rgba(0, 180, 216, 0.1);
            border-radius: 50%;
            z-index: 1;
            transform: rotate(-15deg);
        }

        .brand-curve-right {
            position: absolute;
            bottom: -20%;
            right: -30%;
            width: 70%;
            height: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, rgba(0,0,0,0) 70%);
            border-left: 2px solid rgba(0, 180, 216, 0.15);
            border-radius: 50%;
            z-index: 1;
            transform: rotate(25deg);
        }

        /* 100% Full Screen Modern Panel Matrix */
        .portal-main {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            opacity: 0;
            transform: translateY(20px);
            animation: appReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Header Identity Styling */
        .header-block {
            text-align: center;
            margin-top: 15px;
        }

        /* Clean Modern Minimal Crest Replacement Graphic */
        .crest-wrapper {
            width: 72px;
            height: 72px;
            background: #ffffff;
            border-radius: 20px;
            margin: 0 auto 16px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4), 0 0 0 3px rgba(0, 180, 216, 0.6);
        }

        .crest-wrapper i {
            font-size: 2rem;
            color: #0a1128;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .divider-line {
            width: 40px;
            height: 3px;
            background: #00b4d8; /* Bright Cyan Accent from Card */
            margin: 8px auto;
            border-radius: 2px;
        }

        .subtitle {
            font-size: 0.82rem;
            color: #94a3b8;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Core Action Links Architecture */
        .links-area {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: auto 0;
        }

        .action-card {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            text-decoration: none;
            color: #e2e8f0;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-card i {
            font-size: 1.25rem;
            width: 32px;
            text-align: left;
            transition: transform 0.2s ease;
        }

        /* Clean Functional Component Coloring mapping */
        .fa-phone-flip { color: #00b4d8; }            /* Cyan Accent */
        .fa-phone-volume { color: #38bdf8; }          /* Subtle Blue Accent */
        .fa-file-invoice { color: #34d399; }          /* Emerald Tech Accent */
        .fa-map-location-dot { color: #f87171; }      /* Light Coral Accent */

        .label-text {
            flex-grow: 1;
            font-size: 0.92rem;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .chevron {
            font-size: 0.75rem !important;
            color: #475569;
            text-align: right !important;
            width: auto !important;
        }

        /* Hover & Tap State Responses */
        .action-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(0, 180, 216, 0.3);
            transform: translateX(3px);
        }

        .action-card:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.02);
        }

        /* Premium Social Floating Strip Layout */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding-top: 10px;
            margin-bottom: 10px;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .social-btn i {
            font-size: 1.35rem;
        }

        /* Native Identity Colors for Social Brandings */
        .fa-instagram { color: #e1306c; }
        .fa-facebook { color: #1877f2; }
        .fa-youtube { color: #ff0000; }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-3px);
        }

        .social-btn:active {
            transform: scale(0.92);
        }

        /* Reveal Animation Rules */
        @keyframes appReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="brand-curve-left"></div>
    <div class="brand-curve-right"></div>

    <div class="portal-main">
        
        <div class="header-block">
            <div class="crest-wrapper">
                <i class="fa-solid fa-book-open-reader"></i>
            </div>
            <h1>High School</h1>
            <div class="divider-line"></div>
            <p class="subtitle">DIGITAL CONNECT PORTAL</p>
        </div>

        <div class="links-area">
            
            <a href="tel:+918092285112" class="action-card">
                <i class="fa-solid fa-phone-flip"></i>
                <span class="label-text">Main Office Line</span>
                <i class="fa-solid fa-chevron-right chevron"></i>
            </a>

            <a href="tel:+91XXXXXXXXXX" class="action-card">
                <i class="fa-solid fa-phone-volume"></i>
                <span class="label-text">Alternate Contact Line</span>
                <i class="fa-solid fa-chevron-right chevron"></i>
            </a>

            <a href="https://drive.google.com/file/d/your-shared-fee-pdf-link/view" target="_blank" class="action-card">
                <i class="fa-solid fa-file-invoice"></i>
                <span class="label-text">Admission Brochure & Fee Structure</span>
                <i class="fa-solid fa-chevron-right chevron"></i>
            </a>

            <a href="https://www.google.com/maps/search/?api=1&query=25.591278,85.145679" target="_blank" class="action-card">
                <i class="fa-solid fa-map-location-dot"></i>
                <span class="label-text">Campus Location (Open Maps)</span>
                <i class="fa-solid fa-chevron-right chevron"></i>
            </a>

        </div>

        <div class="social-row">
            <a href="https://instagram.com/yourusername" target="_blank" class="social-btn" aria-label="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://facebook.com/yourusername" target="_blank" class="social-btn" aria-label="Facebook">
                <i class="fa-brands fa-facebook"></i>
            </a>
            <a href="https://youtube.com/@yourusername" target="_blank" class="social-btn" aria-label="YouTube">
                <i class="fa-brands fa-youtube"></i>
            </a>
        </div>

    </div>

    <script>
        const CACHE_NAME = 'inst-portal-v1';
        const ASSETS = [
            window.location.pathname,
            window.location.href,
            'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'
        ];

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const blob = new Blob([`
                    self.addEventListener('install', (e) => {
                        e.waitUntil(caches.open('${CACHE_NAME}').then((cache) => cache.addAll(${JSON.stringify(ASSETS)})));
                    });
                    self.addEventListener('fetch', (e) => {
                        e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request)));
                    });
                `], { type: 'application/javascript' });
                const workerUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(workerUrl).catch(err => {});
            });
        }
    </script>
</body>
</html>
